<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support</title>
  <meta name="description" content="Support contact information." />

  <style>
    :root {
      --text: #111;
      --muted: #555;
      --bg: #fff;
      --card: #fafafa;
      --border: #e6e6e6;
      --link: #0b66ff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f2f2f2;
        --muted: #b6b6b6;
        --bg: #0b0b0b;
        --card: #121212;
        --border: #2a2a2a;
        --link: #5aa2ff;
      }
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 18px;
    }

    header {
      margin-bottom: 24px;
      padding: 18px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.2px;
    }

    a { color: var(--link); }

    .card {
      padding: 18px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    p { margin: 0 0 12px 0; }
    p:last-child { margin-bottom: 0; }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>Support</h1>
    </header>

    <section class="card">
      <p>If you have any questions or feedback, please contact us at:</p>
      <p>Email: <a href="mailto:support@enidapps.com">support@enidapps.com</a></p>
    </section>
  </main>
</body>
</html>
